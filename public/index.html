<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>What You Missed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --font-sans: 'Inter', sans-serif;
        --color-background-primary: #fafaf9;
        --color-background-secondary: #f5f5f4;
        --color-text-primary: #1c1917;
        --color-text-secondary: #78716c;
        --color-border-tertiary: #e7e5e4;
        --color-border-secondary: #d6d3d1;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 32px 16px;
        margin: 0;
      }

      #root {
        display: flex;
        justify-content: center;
      }

      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }

      /* Phone shell */
      .phone {
        width: 390px;
        height: 844px;
        border-radius: 48px;
        background: var(--color-background-primary);
        box-shadow:
          0 0 0 10px #1a1a1a,
          0 0 0 12px #3a3a3a,
          0 32px 64px rgba(0,0,0,0.35);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        flex-shrink: 0;
      }

      /* Dynamic island */
      .dynamic-island {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 34px;
        background: #1a1a1a;
        border-radius: 20px;
        z-index: 100;
        pointer-events: none;
      }

      /* Scrollable content */
      .phone-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .phone-scroll::-webkit-scrollbar { display: none; }

      /* Fixed bottom nav */
      .phone-nav {
        flex-shrink: 0;
        background: rgba(250,250,249,0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--color-border-tertiary);
        padding: 12px 32px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* On actual mobile devices, fill the screen instead of showing phone mockup */
      @media (max-width: 500px) {
        body {
          background: var(--color-background-primary);
          padding: 0;
          align-items: stretch;
        }
        #root {
          width: 100%;
        }
        .phone {
          width: 100%;
          height: 100dvh;
          border-radius: 0;
          box-shadow: none;
        }
        .dynamic-island {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
